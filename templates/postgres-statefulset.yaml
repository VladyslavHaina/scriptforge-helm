{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "scriptforge.fullname" . }}-postgres
spec:
  serviceName: {{ include "scriptforge.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "scriptforge.name" . }}
      component: postgres
  template:
    metadata:
      labels:
        app: {{ include "scriptforge.name" . }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: scriptforge }
            - { name: POSTGRES_USER, value: scriptforge }
            - { name: POSTGRES_PASSWORD, value: scriptforge }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          livenessProbe:
            exec: { command: [pg_isready, -U, scriptforge] }
            periodSeconds: 10
          readinessProbe:
            exec: { command: [pg_isready, -U, scriptforge] }
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests: { storage: {{ .Values.postgres.storage }} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scriptforge.fullname" . }}-postgres
spec:
  selector:
    app: {{ include "scriptforge.name" . }}
    component: postgres
  ports: [{ port: 5432 }]
  clusterIP: None
{{- end }}
