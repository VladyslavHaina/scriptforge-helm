apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scriptforge.fullname" . }}-secret
type: Opaque
stringData:
  SCRIPTFORGE_ENCRYPTION_KEY: {{ required "encryption.key is required" .Values.encryption.key | quote }}
  {{- if and .Values.postgres.enabled .Values.pgbouncer.enabled }}
  SCRIPTFORGE_DATABASE_URL: "postgres://scriptforge:scriptforge@{{ include "scriptforge.fullname" . }}-pgbouncer:5432/scriptforge?sslmode=disable"
  {{- else if .Values.postgres.enabled }}
  SCRIPTFORGE_DATABASE_URL: "postgres://scriptforge:scriptforge@{{ include "scriptforge.fullname" . }}-postgres:5432/scriptforge?sslmode=disable"
  {{- else }}
  SCRIPTFORGE_DATABASE_URL: {{ required "postgres.externalUrl is required when postgres.enabled=false" .Values.postgres.externalUrl | quote }}
  {{- end }}
